worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 25M;
    server_tokens   off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── HTTP: redirect all traffic to HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — mount your certificates into the ssl_certs volume
        # or place fullchain.pem + privkey.pem in docker/ssl/
        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/certs/privkey.pem;

        # Modern TLS settings (TLSv1.2 + TLSv1.3 only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options    "nosniff"                          always;
        add_header X-Frame-Options           "SAMEORIGIN"                       always;
        add_header X-XSS-Protection          "1; mode=block"                    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # Block sensitive files
        location ~ /\.env   { deny all; return 404; }
        location ~ /\.git   { deny all; return 404; }
        location ~ /\.ht    { deny all; return 404; }

        # ── Frontend static assets (long-lived cache) ─────────────────────────
        location /build/ {
            root /var/www/public;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Laravel storage (user-uploaded files) ────────────────────────────
        location /storage/ {
            root /var/www/backend/public;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── Backend API (PHP-FPM) ─────────────────────────────────────────────
        location ~ ^/api(/.*)?$ {
            root /var/www/backend/public;

            # Real client IP (from reverse proxy / load balancer)
            real_ip_header X-Forwarded-For;
            set_real_ip_from 0.0.0.0/0;

            try_files $uri $uri/ /index.php?$query_string;

            location ~ \.php$ {
                fastcgi_pass   app:9000;
                fastcgi_index  index.php;
                fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_param  HTTP_X_REAL_IP  $remote_addr;
                fastcgi_param  HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
                fastcgi_param  HTTPS on;
                include        fastcgi_params;
                fastcgi_read_timeout 120;
                fastcgi_buffers 16 16k;
                fastcgi_buffer_size 32k;
            }
        }

        # ── OAuth callback (also goes to PHP-FPM via Laravel routes) ─────────
        location ~ ^/auth(/.*)?$ {
            root /var/www/backend/public;
            try_files $uri $uri/ /index.php?$query_string;

            location ~ \.php$ {
                fastcgi_pass  app:9000;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_param HTTPS on;
                include       fastcgi_params;
            }
        }

        # ── Vue SPA catch-all (serve index.html for all other routes) ─────────
        location / {
            root  /var/www/public/build;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
