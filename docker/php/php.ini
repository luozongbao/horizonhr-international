; Custom PHP configuration for HRINT

; File upload limits (resume uploads up to 20MB)
upload_max_filesize = 25M
post_max_size = 25M
max_execution_time = 60
max_input_time = 60
memory_limit = 256M

; OPcache (optimise for production)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; Error reporting (override in production via APP_DEBUG=false)
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
