version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: hrint-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/var/www/backend:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hrint

  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: hrint-backend
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=local
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrint

  frontend:
    image: node:20-alpine
    container_name: hrint-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - NODE_ENV=development
    networks:
      - hrint

  mariadb:
    image: mariadb:10.11
    container_name: hrint-mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: hrint
      MYSQL_USER: hrint
      MYSQL_PASSWORD: secret
    volumes:
      - mariadb_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrint

  redis:
    image: redis:7-alpine
    container_name: hrint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrint

  mailpit:
    image: axllent/mailpit:latest
    container_name: hrint-mailpit
    ports:
      - "8025:8025"   # Web UI — http://localhost:8025
      - "1025:1025"   # SMTP
    networks:
      - hrint

volumes:
  mariadb_data:
  redis_data:

networks:
  hrint:
    driver: bridge
